# =============================================================================
# COPY THIS FILE INTO YOUR PUBLIC RELEASES REPO at:
#   .github/workflows/release.yml   (in smaxxey/TRACE-releases — must be PUBLIC)
#
# It checks out the PRIVATE source (smaxxey/TRACE) using a PAT, builds + signs
# the installer, and publishes it + latest.json HERE (the public repo) so the
# Tauri updater can fetch them anonymously. Your source code stays private.
#
# Secrets required in the PUBLIC repo (Settings → Secrets and variables → Actions):
#   SOURCE_REPO_PAT                     - PAT with read access to the private repo
#   TAURI_SIGNING_PRIVATE_KEY           - contents of ~/.tauri/trace.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - the key password
#
# To release: bump "version" in the PRIVATE repo's src-tauri/tauri.conf.json,
# commit + push it, then run this workflow (Actions → Release → Run workflow).
# =============================================================================
name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Private source ref to build (branch or tag)"
        required: true
        default: "main"
  push:
    tags: ["v*"] # optional: also build when a v* tag is pushed to THIS repo

jobs:
  publish:
    permissions:
      contents: write # create the release in this (public) repo
    runs-on: windows-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: smaxxey/TRACE
          ref: ${{ github.event.inputs.ref || github.ref_name }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Stage ffmpeg + ffprobe sidecars (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          $bin = (Get-ChildItem ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1).Directory.FullName
          New-Item -ItemType Directory -Force "src-tauri/binaries" | Out-Null
          Copy-Item "$bin/ffmpeg.exe"  "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item "$bin/ffprobe.exe" "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this (public) repo
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # TODO: OS code signing — Windows Authenticode / Apple Developer ID later.
        with:
          # tagName uses the version from the checked-out tauri.conf.json, so the
          # release is correctly versioned regardless of how it was triggered.
          tagName: v__VERSION__
          releaseName: "TRACE by LOYALTY v__VERSION__"
          releaseBody: "Download the installer below. The app auto-updates from here."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: "--bundles nsis"

      # Give the website a PERMANENT download link that never changes between
      # versions. The NSIS bundle name embeds the version (e.g.
      # "TRACE by LOYALTY_0.4.3_x64-setup.exe"); we copy it to a stable name and
      # attach it to the same release, so this URL always serves the newest build:
      #   https://github.com/smaxxey/TRACE-releases/releases/latest/download/TRACE-Setup.exe
      # (The versioned asset + latest.json stay untouched, so auto-updates keep working.)
      - name: Publish version-less installer for the website
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $setup = Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No NSIS installer was produced" }
          Copy-Item $setup.FullName "TRACE-Setup.exe"
          $ver = (Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json).version
          gh release upload "v$ver" "TRACE-Setup.exe" --clobber --repo "$env:GITHUB_REPOSITORY"
